<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post - Remindi</title>
  <meta name="description" content="Read our latest articles about AMC management and service contractor software." />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #29ABE2;
      --blue-dark: #1e96cc;
      --blue-light: #4FC3F7;
      --blue-bg: #E8F6FD;
      --white: #ffffff;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
      --gray-900: #0F172A;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
      --shadow-blue: 0 8px 32px rgba(41,171,226,.30);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--gray-800);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── NAVBAR ─────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
      transition: box-shadow .3s;
    }
    .navbar.scrolled { box-shadow: var(--shadow-md); }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.01em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--gray-600);
      font-size: .92rem;
      font-weight: 500;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--blue); }

    .btn-nav {
      background: var(--blue);
      color: white;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
    }
    .btn-nav:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow-blue);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--gray-700);
      border-radius: 2px;
      transition: all .3s;
    }

    /* ─── PAGE ───────────────────────────────────────── */
    main { padding-top: 100px; padding-bottom: 80px; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: .9rem;
    }
    .breadcrumb a {
      color: var(--blue);
      text-decoration: none;
      transition: color .2s;
    }
    .breadcrumb a:hover { color: var(--blue-dark); }
    .breadcrumb span { color: var(--gray-500); }

    .post-header {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--gray-200);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      font-size: .9rem;
    }

    .post-date {
      color: var(--blue);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .post-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      color: var(--gray-900);
      line-height: 1.2;
    }

    /* ─── CONTENT ────────────────────────────────────── */
    .post-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--gray-700);
    }

    .post-content h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-top: 40px;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .post-content p {
      margin-bottom: 20px;
    }

    .post-content p:first-letter {
      font-size: 1.05em;
    }

    /* ─── CTA SECTION ────────────────────────────────── */
    .post-cta {
      margin-top: 64px;
      padding-top: 48px;
      padding: 48px;
      background: var(--blue-bg);
      border-radius: var(--radius);
      text-align: center;
    }

    .post-cta h3 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 16px;
    }

    .post-cta p {
      font-size: .95rem;
      color: var(--gray-600);
      margin-bottom: 24px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary:hover {
      background: var(--blue-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-blue);
    }

    .loading {
      text-align: center;
      padding: 80px 24px;
      font-size: 1.05rem;
      color: var(--gray-500);
    }

    .error {
      text-align: center;
      padding: 80px 24px;
      color: #DC2626;
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 768px) {
      main { padding-top: 80px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .post-header h1 { font-size: 1.5rem; }
      .post-content { font-size: 1rem; }
      .post-content h2 { font-size: 1.35rem; }
      .post-cta { padding: 32px 24px; }
      .breadcrumb { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">remindi</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/blog" style="color: var(--blue);">Blog</a></li>
        <li><a href="/#features">Features</a></li>
        <li><a href="/#pricing">Pricing</a></li>
        <li><a href="/#faq">FAQ</a></li>
      </ul>
      <a href="/" class="btn-nav">Get Started</a>
      <button class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="container">
      <div class="breadcrumb">
        <a href="/blog">← Back to Blog</a>
      </div>

      <div id="postContainer">
        <div class="loading">Loading post...</div>
      </div>
    </div>
  </main>

  <script>
    async function loadPost() {
      try {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        if (!slug) {
          showError('No post specified.');
          return;
        }

        const response = await fetch('/blog/posts.json');
        const posts = await response.json();
        const post = posts.find(p => p.slug === slug);

        if (!post) {
          showError('Post not found.');
          return;
        }

        // Update page metadata for SEO
        document.title = `${post.title} - Remindi Blog`;
        document.querySelector('meta[name="description"]').setAttribute('content', post.description);

        // Render post content
        const postContainer = document.getElementById('postContainer');
        const formattedDate = new Date(post.date).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });

        postContainer.innerHTML = `
          <article>
            <div class="post-header">
              <div class="post-meta">
                <span class="post-date">${formattedDate}</span>
              </div>
              <h1>${escapeHtml(post.title)}</h1>
            </div>

            <div class="post-content">
              ${post.content}
            </div>

            <div class="post-cta">
              <h3>Ready to transform your service business?</h3>
              <p>Join hundreds of contractors who are managing their AMC contracts more efficiently with Remindi.</p>
              <a href="/" class="btn-primary">Try Remindi Free →</a>
            </div>
          </article>
        `;
      } catch (error) {
        console.error('Error loading post:', error);
        showError('Error loading post. Please try again later.');
      }
    }

    function showError(message) {
      document.getElementById('postContainer').innerHTML = `<div class="error"><p>${escapeHtml(message)}</p><a href="/blog" style="color: var(--blue); text-decoration: none;">← Back to Blog</a></div>`;
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Scroll effect on navbar
    window.addEventListener('scroll', () => {
      document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    // Load post on page load
    loadPost();
  </script>
</body>
</html>
