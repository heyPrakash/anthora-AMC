<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog - Remindi</title>
  <meta name="description" content="Read articles about AMC management, service contractor software, and growing your service business in India." />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #29ABE2;
      --blue-dark: #1e96cc;
      --blue-light: #4FC3F7;
      --blue-bg: #E8F6FD;
      --white: #ffffff;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
      --gray-900: #0F172A;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
      --shadow-blue: 0 8px 32px rgba(41,171,226,.30);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--gray-800);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── NAVBAR ─────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
      transition: box-shadow .3s;
    }
    .navbar.scrolled { box-shadow: var(--shadow-md); }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.01em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--gray-600);
      font-size: .92rem;
      font-weight: 500;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--blue); }

    .btn-nav {
      background: var(--blue);
      color: white;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
    }
    .btn-nav:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow-blue);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--gray-700);
      border-radius: 2px;
      transition: all .3s;
    }

    /* ─── PAGE ───────────────────────────────────────── */
    main { padding-top: 100px; padding-bottom: 80px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .blog-header {
      text-align: center;
      margin-bottom: 64px;
    }
    .blog-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .blog-header p {
      font-size: 1.05rem;
      color: var(--gray-500);
      max-width: 600px;
      margin: 0 auto;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 32px;
      margin-bottom: 32px;
    }

    .post-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 32px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .post-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--blue);
    }

    .post-date {
      font-size: .82rem;
      color: var(--blue);
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .post-card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .post-card p {
      font-size: .95rem;
      color: var(--gray-600);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .post-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      transition: gap .2s;
    }
    .post-link:hover { gap: 12px; }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--gray-500);
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 768px) {
      main { padding-top: 80px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .blog-header h1 { font-size: 1.8rem; }
      .posts-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">remindi</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/blog" style="color: var(--blue);">Blog</a></li>
        <li><a href="/#features">Features</a></li>
        <li><a href="/#pricing">Pricing</a></li>
        <li><a href="/#faq">FAQ</a></li>
      </ul>
      <a href="/" class="btn-nav">Get Started</a>
      <button class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="container">
      <div class="blog-header">
        <h1>Blog</h1>
        <p>Tips, guides, and stories from AMC contractors growing their businesses with Remindi</p>
      </div>

      <div class="posts-grid" id="postsGrid">
        <!-- Posts will be loaded here by JavaScript -->
      </div>
    </div>
  </main>

  <script>
    async function loadPosts() {
      try {
        const response = await fetch('/blog/posts.json');
        const posts = await response.json();
        const postsGrid = document.getElementById('postsGrid');

        if (!posts || posts.length === 0) {
          postsGrid.innerHTML = '<div class="empty-state"><p>No posts available yet.</p></div>';
          return;
        }

        postsGrid.innerHTML = posts.map(post => `
          <a href="/blog/post.html?slug=${post.slug}" class="post-card" style="text-decoration: none; color: inherit;">
            <div class="post-date">${new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
            <h2>${post.title}</h2>
            <p>${post.description}</p>
            <span class="post-link">Read article →</span>
          </a>
        `).join('');
      } catch (error) {
        console.error('Error loading posts:', error);
        document.getElementById('postsGrid').innerHTML = '<div class="empty-state"><p>Error loading posts. Please try again later.</p></div>';
      }
    }

    // Scroll effect on navbar
    window.addEventListener('scroll', () => {
      document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    // Load posts on page load
    loadPosts();
  </script>
</body>
</html>
